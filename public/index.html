<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MarkIndia - Buy & Sell</title>

  <!-- Mobile Responsive -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- CSS -->
  <link rel="stylesheet" href="css/style.css">

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>

<body onload="checkAuth(); loadProducts(); getLocation();">

  <!-- 🔝 NAVBAR -->
  <header class="navbar">
    <div class="logo">
      <!-- Replace with your logo later -->
      <img src="assets/images/logo.png" alt="MarkIndia Logo" id="logo">
      <h2>MarkIndia</h2>
    </div>

    <nav>
      <a href="index.html">Home</a>
      <a href="post.html">Post Ad</a>
      <a href="profile.html">My Ads</a>
      <button onclick="logout()">Logout</button>
    </nav>
  </header>

  <!-- 🔍 SEARCH + FILTER -->
  <section class="filters">
    <input 
      type="text" 
      id="search" 
      placeholder="Search products..." 
      onkeyup="applyFilters()"
    >

    <select id="categoryFilter" onchange="applyFilters()">
      <option value="all">All Categories</option>
      <option value="Electronics">Electronics</option>
      <option value="Vehicles">Vehicles</option>
      <option value="Books">Books</option>
    </select>

    <button onclick="filterNearby()">Nearby</button>
  </section>

  <!-- 📦 PRODUCTS -->
  <main class="container">
    <div id="products">
      <!-- Products load here -->
      <p>Loading products...</p>
    </div>
  </main>

  <!-- 📌 FOOTER -->
  <footer class="footer">
    <p>© 2026 MarkIndia. All rights reserved.</p>
  </footer>

  <!-- JS -->
  <script src="js/firebase.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/product.js"></script>
  <script src="js/upload.js"></script>
  <script src="js/main.js"></script>

</body>
</html>
